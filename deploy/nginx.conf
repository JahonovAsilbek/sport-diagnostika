# deploy/nginx.conf — reverse proxy: Vue SPA + Django (gunicorn `web`).
# HTTP-only for now; TLS terminates here in D5. Mounted at
# /etc/nginx/conf.d/default.conf by deploy/docker-compose.prod.yml.
upstream web {
    server web:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # B11 caps Excel imports at 5 MB in the app; allow headroom so an oversize upload
    # reaches Django and gets its own error instead of a bare nginx 413 on multipart overhead.
    client_max_body_size 8m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types application/json application/javascript application/manifest+json
               application/xml text/css text/plain text/xml image/svg+xml application/wasm;

    # Security headers for nginx-served responses (SPA / static / media). The proxied
    # locations hide Django's own copies below so exactly one survives.
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-Frame-Options        "DENY"        always;
    add_header Referrer-Policy         "same-origin" always;

    # --- Django API (+ /api/schema/, /api/docs/, /api/v1/health/) ---
    location /api/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Single edge proxy: OVERWRITE X-Forwarded-For (apps/audit reads the FIRST hop),
        # so a client-supplied header cannot spoof the audit IP.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
    }

    # --- collected static (STATIC_ROOT=/app/staticfiles, written by collectstatic) ---
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
        gzip_static on;   # serve WhiteNoise-precompressed .gz siblings when present
    }

    # --- user media (uploaded imports + generated reports), read-only volume ---
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
        add_header X-Content-Type-Options "nosniff" always;  # never sniff uploads
    }

    # --- Vue SPA (history-mode fallback). 404 until the F-block build fills frontend/dist. ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
