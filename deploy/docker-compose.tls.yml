# deploy/docker-compose.tls.yml — TLS overlay (D5). Third file on top of base + prod:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.prod.yml \
#                  -f deploy/docker-compose.tls.yml up -d
# Adds Let's Encrypt certs (certbot --webroot), the :443 listener + HTTP→HTTPS redirect, and
# re-enables the HTTPS-only hardening. Bootstrap the first cert with scripts/init-letsencrypt.sh
# BEFORE the first `up`. Needs Compose >= 2.24 for the !override merge tag (repo runs 5.x).

services:
  web:
    environment:
      # Real certs exist now → HTTPS hardening back on (HSTS, Secure cookies). Belt-and-
      # suspenders: nginx already redirects http→https at the edge; /api/v1/health/ is exempt.
      SECURE_SSL_REDIRECT: "True"
      # Prod migrates via a dedicated one-shot job (scripts/deploy.sh), never on web start —
      # so scaling web beyond one replica can't race the schema.
      MIGRATE_ON_START: "0"

  nginx:
    # Swap the HTTP-only config for the TLS one + mount the certs and the ACME webroot.
    # !override REPLACES the prod nginx volume list, so static/media/frontend are re-listed.
    volumes: !override
      - ./nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/usr/share/nginx/static:ro
      - media:/usr/share/nginx/media:ro
      - ../frontend/dist:/usr/share/nginx/html:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "443:443"   # appended to prod's "80:80"
    # Reload every 6h so renewed certs are picked up without a restart. `sleep & wait` keeps
    # SIGTERM responsive; nginx runs in the foreground as the container's main process.
    command: ["/bin/sh", "-c", "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"]

  # Renews certs twice a day (certbot only acts within 30 days of expiry). Shares the cert +
  # webroot volumes with nginx. init-letsencrypt.sh overrides this loop with
  # `run --rm --entrypoint …` for one-shot issuance.
  certbot:
    image: certbot/certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"]
    networks: [sport]

volumes:
  letsencrypt:
  certbot_www:
