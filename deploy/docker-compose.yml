name: sport-diagnostika

# Shared backend env — app services reach db/redis by their compose service names
# (overriding the localhost URLs from backend/.env, which are for host-based access).
x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.dev
  DATABASE_URL: postgres://${POSTGRES_USER:-sport}:${POSTGRES_PASSWORD:-sport}@db:5432/${POSTGRES_DB:-sport}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2

x-db-redis-healthy: &db-redis-healthy
  db:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sport}
      POSTGRES_USER: ${POSTGRES_USER:-sport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sport}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sport} -d $${POSTGRES_DB:-sport}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sport]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sport]

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sport-backend:dev
    entrypoint: ["/entrypoint.sh"]
    # Dev command (runserver + hot-reload); prod (D5) drops the mount and uses gunicorn.
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file: ../backend/.env
    environment: *backend-env
    volumes:
      - ../backend:/app
      - media:/app/media  # shared with worker — uploaded imports (B11) + reports (B12)
    ports:
      - "8000:8000"
    depends_on: *db-redis-healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/',timeout=3).status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [sport]

  worker:
    image: sport-backend:dev
    command: ["celery", "-A", "config", "worker", "-l", "info"]
    env_file: ../backend/.env
    environment: *backend-env
    # Same media volume as web — the worker parses uploaded imports and writes reports.
    volumes:
      - media:/app/media
    depends_on: *db-redis-healthy
    networks: [sport]

  # Exactly one beat instance (avoids duplicate scheduled tasks). Uses the
  # django-celery-beat DatabaseScheduler (DVPS-7) so periodic tasks are DB-backed and
  # editable from the admin — waits on `web` (which migrates) so its tables exist first.
  beat:
    image: sport-backend:dev
    command: ["celery", "-A", "config", "beat", "-l", "info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    env_file: ../backend/.env
    environment: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    networks: [sport]

volumes:
  pgdata:
  media:

networks:
  sport:
