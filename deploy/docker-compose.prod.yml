# deploy/docker-compose.prod.yml — production overlay: gunicorn + nginx, no source mount.
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml up -d
# (or `make prod-up`). HTTP-only until D5 adds TLS. Needs Docker Compose >= 2.24 for the
# `!override` / `!reset` merge tags (this repo runs 5.x).

services:
  web:
    # Runserver (base) → gunicorn. `--access-logfile -` sends access logs to stdout.
    command: ["gunicorn", "config.wsgi", "--bind", "0.0.0.0:8000",
              "--workers", "3", "--access-logfile", "-"]
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      COLLECTSTATIC: "1"  # entrypoint runs collectstatic into the shared `static` volume
      # D3 is HTTP-only (TLS lands in D5). Keep the HTTPS-only hardening off so the internal
      # healthcheck and admin login work over http; prod.py re-enables it by default in D5.
      SECURE_SSL_REDIRECT: "False"
    # Replace the base list wholesale — drops the ../backend:/app source mount (prod ships
    # the baked image). Keeps media + adds the collectstatic target volume.
    volumes: !override
      - media:/app/media
      - static:/app/staticfiles
    ports: !reset []  # only nginx is published to the host

  # Celery services run the same image; without this they'd start under dev settings.
  worker:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  beat:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/usr/share/nginx/static:ro
      - media:/usr/share/nginx/media:ro
      # Vite build output (produced by the F-blocks); `/` → 404 until it exists.
      - ../frontend/dist:/usr/share/nginx/html:ro
    networks: [sport]

volumes:
  static:
