# deploy/nginx.tls.conf — TLS reverse proxy (D5). Mounted at /etc/nginx/conf.d/default.conf
# by deploy/docker-compose.tls.yml. Certs come from Let's Encrypt (certbot --webroot);
# bootstrap the first cert with scripts/init-letsencrypt.sh before the first `up`.
upstream web {
    server web:8000;
}

# --- HTTP :80 — ACME HTTP-01 challenge + permanent redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name sport-diagnostika.uz www.sport-diagnostika.uz;

    # Shared webroot the certbot container writes challenges into. Must stay reachable over
    # plain HTTP — this one location is NOT redirected.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS :443 — the application (apex host) ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;                       # nginx >= 1.25.1; replaces the deprecated `listen … http2`
    server_name sport-diagnostika.uz;

    ssl_certificate     /etc/letsencrypt/live/sport-diagnostika.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sport-diagnostika.uz/privkey.pem;

    # Mozilla "intermediate" (TLS 1.2 + 1.3), ECDHE → no custom dhparam needed.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # OCSP stapling intentionally omitted — Let's Encrypt retired OCSP in 2025 (CRL only).

    client_max_body_size 8m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types application/json application/javascript application/manifest+json
               application/xml text/css text/plain text/xml image/svg+xml application/wasm;

    # HSTS is set HERE (not only in Django) so the SPA/static/media roots carry it too —
    # preload requires the root document to send it, and Django never sees those requests.
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-Frame-Options           "DENY"        always;
    add_header Referrer-Policy           "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # --- Django API (+ /api/schema/, /api/docs/, /api/v1/health/) ---
    location /api/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Overwrite XFF (apps/audit reads the first hop) so the audit IP can't be spoofed.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;   # =https on :443 → Django is_secure()
        proxy_read_timeout 60s;
        # Django emits these too — hide its copies so exactly one (nginx's) survives.
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
    }

    # --- Django admin ---
    location /admin/ {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
    }

    # --- collected static (STATIC_ROOT=/app/staticfiles) ---
    location /static/ {
        alias /usr/share/nginx/static/;
        access_log off;
        expires 30d;
        gzip_static on;
    }

    # --- user media (uploads/reports), read-only volume ---
    location /media/ {
        alias /usr/share/nginx/media/;
        access_log off;
        expires 7d;
        # This block has its own add_header, so it does NOT inherit the server-level set —
        # re-assert the two that matter for user uploads.
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # --- Vue SPA (history-mode fallback); 404 until the F-block build fills frontend/dist ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# --- HTTPS :443 — canonical redirect www → apex ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.sport-diagnostika.uz;

    ssl_certificate     /etc/letsencrypt/live/sport-diagnostika.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sport-diagnostika.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    return 301 https://sport-diagnostika.uz$request_uri;
}
