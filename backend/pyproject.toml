# Tooling config for the backend (ruff + pytest). Dependencies live in requirements*.txt.

[tool.ruff]
line-length = 100
target-version = "py312"
# Auto-generated migrations are not linted.
extend-exclude = ["**/migrations/**"]

[tool.ruff.lint]
# E/F pycodestyle+pyflakes, I isort, UP pyupgrade, B bugbear, DJ flake8-django.
select = ["E", "F", "I", "UP", "B", "DJ"]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
addopts = "--reuse-db"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
